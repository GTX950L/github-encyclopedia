# Markdown 格式检查
name: Markdown Lint

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'README.md'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint 'docs/**/*.md' 'README.md' --ignore node_modules
        continue-on-error: true
