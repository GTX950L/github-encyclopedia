# lychee link checker 配置
# https://github.com/lycheeverse/lychee

# 排除外部链接（不检查这些）
exclude = [
  # GitHub 内部链接（无需网络验证）
  'https://github.com/GTX950L/github-encyclopedia',
  'https://github.com/GTX950L',
  # Star History 图
  'https://api.star-history.com',
  # 访问计数 badge
  'https://api.visitorbadge.io',
]

# 排除以这些开头的链接
exclude_path = [
  'node_modules/',
  'vendor/',
  '.git/',
]

# 超时设置
timeout = 20

# 允许重定向
follow_redirects = true

# 最大并发请求数
max_concurrency = 8

# 最大重试次数
max_retries = 2

# 排除特定 HTTP 状态码
accept = [200, 301, 302]

# 检查内部文件链接（相对路径）
include_fragments = true

# 使用 verbose 输出
verbose = true
