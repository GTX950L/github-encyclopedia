<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0366d6"/>
      <stop offset="100%" style="stop-color:#2188ff"/>
    </linearGradient>
  </defs>
  <!-- Book base -->
  <rect x="15" y="15" width="70" height="70" rx="10" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="48" y="20" width="4" height="60" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Book pages -->
  <rect x="22" y="25" width="26" height="8" rx="3" fill="rgba(255,255,255,0.9)"/>
  <rect x="22" y="38" width="26" height="8" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="22" y="51" width="26" height="8" rx="3" fill="rgba(255,255,255,0.5)"/>
  <!-- Right page -->
  <rect x="52" y="25" width="26" height="50" rx="3" fill="rgba(255,255,255,0.9)"/>
  <!-- Octocat tail on cover -->
  <circle cx="65" cy="58" r="6" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <path d="M59 60 Q59 68 65 68 Q71 68 71 60" fill="none" stroke="url(#bg)" stroke-width="2"/>
  <!-- Star -->
  <polygon points="50,78 53,84 60,85 55,89 56,96 50,92 44,96 45,89 40,85 47,84" fill="#ffd700"/>
</svg>
